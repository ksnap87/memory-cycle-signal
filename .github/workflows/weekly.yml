name: weekly-dashboard

on:
  schedule:
    - cron: '0 23 * * 0'   # 일요일 23:00 UTC = 월요일 08:00 KST
  workflow_dispatch: {}     # 수동 실행 버튼

permissions:
  contents: write           # docs/ 갱신분을 main 에 push

concurrency:
  group: weekly-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install -r requirements-ci.txt

      - name: 데이터 갱신 + 신호 계산 + 대시보드 생성
        env:
          CUSTOMS_API_KEY: ${{ secrets.CUSTOMS_API_KEY }}   # 없으면 fetch_current 가 수출 갱신을 건너뜀(비치명적)
        run: |
          python3 src/fetch_current.py
          python3 src/compute_signals.py
          python3 src/build_dashboard.py

      - name: 대시보드 암호화 (StatiCrypt) — 비번 없으면 게시 건너뜀
        id: enc
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::warning::STATICRYPT_PASSWORD 미설정 — 평문 노출 방지를 위해 게시를 건너뜁니다. 시크릿을 추가하면 자동 갱신이 켜집니다."
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx --yes staticrypt docs/index.html \
            -p "$STATICRYPT_PASSWORD" \
            -d docs \
            -s 2d373dd09c3a163d81c461e24c25a64f \
            -c false --short

      - name: 갱신분 커밋 & push
        if: steps.enc.outputs.skip != '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/processed/panel_monthly.csv data/history/ data/raw/exports_semiconductor.csv
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "주간 갱신: $(date -u +%Y-%m-%d)"
            git push
          fi
